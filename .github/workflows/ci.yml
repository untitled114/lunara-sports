name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        default: deploy
        type: choice
        options:
          - deploy
          - restart_services
      services:
        description: "Services (comma-separated, or 'all')"
        required: false
        default: all
        type: string

env:
  GCP_PROJECT: professional-portafolio
  GCP_REGION: us-central1
  IMAGE_REGISTRY: gcr.io/professional-portafolio
  SA_EMAIL: lunara-svc@professional-portafolio.iam.gserviceaccount.com
  WIF_PROVIDER: projects/889243758895/locations/global/workloadIdentityPools/github-actions/providers/github

jobs:
  # ─── Lint & Test ─────────────────────────────────────────────────────────────
  python-lint-test:
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            ingestion/pyproject.toml
            api/pyproject.toml
            lumen-bot/pyproject.toml

      - name: Install ingestion dependencies
        run: cd ingestion && pip install ".[dev]"

      - name: Install api dependencies
        run: cd api && pip install ".[dev]"

      - name: Install lumen-bot dependencies
        run: cd lumen-bot && pip install -e ".[dev]"

      - name: Lint ingestion
        run: cd ingestion && ruff check src/ tests/

      - name: Lint api
        run: cd api && ruff check src/ tests/

      - name: Lint lumen-bot
        run: cd lumen-bot && ruff check *.py tests/

      - name: Test ingestion
        run: cd ingestion && pytest tests/ -v

      - name: Test api
        run: cd api && pytest tests/ -v

      - name: Test lumen-bot
        run: cd lumen-bot && pytest tests/ -v

  java-test:
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Run stream-processor unit tests
        run: cd stream-processor && ./gradlew test

  # ─── Build, Push & Deploy ───────────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: [python-lint-test, java-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT }}

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      # ── Build & push all service images ──
      - name: Build & push API
        run: |
          docker build -t ${{ env.IMAGE_REGISTRY }}/api:latest \
                       -t ${{ env.IMAGE_REGISTRY }}/api:${{ github.sha }} \
                       ./api
          docker push ${{ env.IMAGE_REGISTRY }}/api --all-tags

      - name: Build & push Ingestion
        run: |
          docker build -t ${{ env.IMAGE_REGISTRY }}/ingestion:latest \
                       -t ${{ env.IMAGE_REGISTRY }}/ingestion:${{ github.sha }} \
                       ./ingestion
          docker push ${{ env.IMAGE_REGISTRY }}/ingestion --all-tags

      - name: Build & push Stream Processor
        run: |
          docker build -t ${{ env.IMAGE_REGISTRY }}/stream-processor-pubsub:latest \
                       -t ${{ env.IMAGE_REGISTRY }}/stream-processor-pubsub:${{ github.sha }} \
                       ./stream-processor-pubsub
          docker push ${{ env.IMAGE_REGISTRY }}/stream-processor-pubsub --all-tags

      - name: Build & push Lumen Bot
        run: |
          docker build -t ${{ env.IMAGE_REGISTRY }}/lumen-bot:latest \
                       -t ${{ env.IMAGE_REGISTRY }}/lumen-bot:${{ github.sha }} \
                       ./lumen-bot
          docker push ${{ env.IMAGE_REGISTRY }}/lumen-bot --all-tags

      # ── Deploy to Cloud Run ──
      - name: Deploy API
        run: |
          gcloud run deploy lunara-api \
            --image=${{ env.IMAGE_REGISTRY }}/api:${{ github.sha }} \
            --platform=managed \
            --region=${{ env.GCP_REGION }} \
            --port=8000 \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=1 \
            --max-instances=10 \
            --allow-unauthenticated \
            --service-account=${{ env.SA_EMAIL }} \
            --add-cloudsql-instances=${{ env.GCP_PROJECT }}:${{ env.GCP_REGION }}:lunara-postgres \
            --vpc-connector=lunara-connector \
            --set-secrets="DATABASE_URL=lunara-db-url:latest,JWT_SECRET=lunara-jwt-secret:latest,SPORT_SUITE_API_KEY=lunara-sport-suite-api-key:latest,REDIS_URL=lunara-redis-url:latest" \
            --set-env-vars="SPORT_SUITE_API_URL=http://16.58.146.197:8000,GOOGLE_CLOUD_PROJECT=${{ env.GCP_PROJECT }}" \
            --quiet

      - name: Deploy Ingestion
        run: |
          gcloud run deploy lunara-ingestion \
            --image=${{ env.IMAGE_REGISTRY }}/ingestion:${{ github.sha }} \
            --platform=managed \
            --region=${{ env.GCP_REGION }} \
            --memory=256Mi \
            --cpu=1 \
            --min-instances=1 \
            --max-instances=1 \
            --no-allow-unauthenticated \
            --service-account=${{ env.SA_EMAIL }} \
            --set-env-vars="PUBSUB_PROJECT=${{ env.GCP_PROJECT }},PUBSUB_TOPIC_PLAYS=raw-plays,PUBSUB_TOPIC_SCOREBOARD=raw-scoreboard" \
            --quiet

      - name: Deploy Stream Processor
        run: |
          gcloud run deploy lunara-stream-processor \
            --image=${{ env.IMAGE_REGISTRY }}/stream-processor-pubsub:${{ github.sha }} \
            --platform=managed \
            --region=${{ env.GCP_REGION }} \
            --memory=256Mi \
            --cpu=1 \
            --min-instances=1 \
            --max-instances=1 \
            --no-allow-unauthenticated \
            --service-account=${{ env.SA_EMAIL }} \
            --vpc-connector=lunara-connector \
            --add-cloudsql-instances=${{ env.GCP_PROJECT }}:${{ env.GCP_REGION }}:lunara-postgres \
            --set-secrets="DATABASE_URL=lunara-db-url:latest" \
            --set-env-vars="GOOGLE_CLOUD_PROJECT=${{ env.GCP_PROJECT }},PUBSUB_SUB_PLAYS=raw-plays-sub,PUBSUB_SUB_SCOREBOARD=raw-scoreboard-sub,PUBSUB_TOPIC_ENRICHED=enriched-plays,PUBSUB_TOPIC_STATE=game-state" \
            --quiet

      - name: Deploy Lumen Bot
        run: |
          gcloud run deploy cephalon-lumen \
            --image=${{ env.IMAGE_REGISTRY }}/lumen-bot:${{ github.sha }} \
            --platform=managed \
            --region=${{ env.GCP_REGION }} \
            --port=8080 \
            --memory=256Mi \
            --cpu=1 \
            --min-instances=1 \
            --max-instances=1 \
            --no-allow-unauthenticated \
            --service-account=${{ env.SA_EMAIL }} \
            --set-secrets="DISCORD_TOKEN=lumen-discord-token:latest,ANTHROPIC_API_KEY=anthropic-api-key:latest" \
            --set-env-vars="LUNARA_API_URL=https://lunara-api-889243758895.us-central1.run.app,LUNARA_WS_URL=wss://lunara-api-889243758895.us-central1.run.app/ws" \
            --quiet

      - name: Print deployed revisions
        run: |
          echo "=== Deployed Revisions ==="
          for svc in lunara-api lunara-ingestion lunara-stream-processor cephalon-lumen; do
            URL=$(gcloud run services describe "$svc" \
              --region=${{ env.GCP_REGION }} --format="value(status.url)" 2>/dev/null || echo "N/A")
            REV=$(gcloud run services describe "$svc" \
              --region=${{ env.GCP_REGION }} --format="value(status.latestReadyRevisionName)" 2>/dev/null || echo "N/A")
            echo "  $svc: $REV ($URL)"
          done

  # ─── Manual: Restart Services ───────────────────────────────────────────────
  restart:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'restart_services'
    permissions:
      contents: read
      id-token: write

    steps:
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT }}

      - name: Restart services
        run: |
          INPUT="${{ github.event.inputs.services }}"
          declare -A SERVICE_MAP=(
            [api]="lunara-api"
            [ingestion]="lunara-ingestion"
            [processor]="lunara-stream-processor"
            [lumen]="cephalon-lumen"
          )

          if [[ "$INPUT" == "all" || -z "$INPUT" ]]; then
            TARGETS=("lunara-api" "lunara-ingestion" "lunara-stream-processor" "cephalon-lumen")
          else
            TARGETS=()
            IFS=',' read -ra PARTS <<< "$INPUT"
            for part in "${PARTS[@]}"; do
              key=$(echo "$part" | xargs)  # trim whitespace
              if [[ -n "${SERVICE_MAP[$key]+_}" ]]; then
                TARGETS+=("${SERVICE_MAP[$key]}")
              else
                echo "Unknown service: $key (valid: api, ingestion, processor, lumen)"
              fi
            done
          fi

          for svc in "${TARGETS[@]}"; do
            echo "Restarting $svc..."
            # Get current image to redeploy with same config (forces new revision)
            IMAGE=$(gcloud run services describe "$svc" \
              --region=${{ env.GCP_REGION }} \
              --format="value(spec.template.spec.containers[0].image)")
            gcloud run deploy "$svc" \
              --image="$IMAGE" \
              --region=${{ env.GCP_REGION }} \
              --quiet
            echo "  ✓ $svc restarted"
          done

  # ─── Manual: Deploy (re-deploy from latest main) ───────────────────────────
  manual-deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'deploy'
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT }}

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      - name: Determine services to deploy
        id: svc
        run: |
          INPUT="${{ github.event.inputs.services }}"
          if [[ "$INPUT" == "all" || -z "$INPUT" ]]; then
            echo "api=true" >> "$GITHUB_OUTPUT"
            echo "ingestion=true" >> "$GITHUB_OUTPUT"
            echo "processor=true" >> "$GITHUB_OUTPUT"
            echo "lumen=true" >> "$GITHUB_OUTPUT"
          else
            IFS=',' read -ra PARTS <<< "$INPUT"
            for part in "${PARTS[@]}"; do
              key=$(echo "$part" | xargs)
              echo "$key=true" >> "$GITHUB_OUTPUT"
            done
          fi

      - name: Build & push API
        if: steps.svc.outputs.api == 'true'
        run: |
          docker build -t ${{ env.IMAGE_REGISTRY }}/api:${{ github.sha }} ./api
          docker push ${{ env.IMAGE_REGISTRY }}/api:${{ github.sha }}

      - name: Build & push Ingestion
        if: steps.svc.outputs.ingestion == 'true'
        run: |
          docker build -t ${{ env.IMAGE_REGISTRY }}/ingestion:${{ github.sha }} ./ingestion
          docker push ${{ env.IMAGE_REGISTRY }}/ingestion:${{ github.sha }}

      - name: Build & push Stream Processor
        if: steps.svc.outputs.processor == 'true'
        run: |
          docker build -t ${{ env.IMAGE_REGISTRY }}/stream-processor-pubsub:${{ github.sha }} ./stream-processor-pubsub
          docker push ${{ env.IMAGE_REGISTRY }}/stream-processor-pubsub:${{ github.sha }}

      - name: Build & push Lumen Bot
        if: steps.svc.outputs.lumen == 'true'
        run: |
          docker build -t ${{ env.IMAGE_REGISTRY }}/lumen-bot:${{ github.sha }} ./lumen-bot
          docker push ${{ env.IMAGE_REGISTRY }}/lumen-bot:${{ github.sha }}

      - name: Deploy API
        if: steps.svc.outputs.api == 'true'
        run: |
          gcloud run deploy lunara-api \
            --image=${{ env.IMAGE_REGISTRY }}/api:${{ github.sha }} \
            --platform=managed \
            --region=${{ env.GCP_REGION }} \
            --port=8000 \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=1 \
            --max-instances=10 \
            --allow-unauthenticated \
            --service-account=${{ env.SA_EMAIL }} \
            --add-cloudsql-instances=${{ env.GCP_PROJECT }}:${{ env.GCP_REGION }}:lunara-postgres \
            --vpc-connector=lunara-connector \
            --set-secrets="DATABASE_URL=lunara-db-url:latest,JWT_SECRET=lunara-jwt-secret:latest,SPORT_SUITE_API_KEY=lunara-sport-suite-api-key:latest,REDIS_URL=lunara-redis-url:latest" \
            --set-env-vars="SPORT_SUITE_API_URL=http://16.58.146.197:8000,GOOGLE_CLOUD_PROJECT=${{ env.GCP_PROJECT }}" \
            --quiet

      - name: Deploy Ingestion
        if: steps.svc.outputs.ingestion == 'true'
        run: |
          gcloud run deploy lunara-ingestion \
            --image=${{ env.IMAGE_REGISTRY }}/ingestion:${{ github.sha }} \
            --platform=managed \
            --region=${{ env.GCP_REGION }} \
            --memory=256Mi \
            --cpu=1 \
            --min-instances=1 \
            --max-instances=1 \
            --no-allow-unauthenticated \
            --service-account=${{ env.SA_EMAIL }} \
            --set-env-vars="PUBSUB_PROJECT=${{ env.GCP_PROJECT }},PUBSUB_TOPIC_PLAYS=raw-plays,PUBSUB_TOPIC_SCOREBOARD=raw-scoreboard" \
            --quiet

      - name: Deploy Stream Processor
        if: steps.svc.outputs.processor == 'true'
        run: |
          gcloud run deploy lunara-stream-processor \
            --image=${{ env.IMAGE_REGISTRY }}/stream-processor-pubsub:${{ github.sha }} \
            --platform=managed \
            --region=${{ env.GCP_REGION }} \
            --memory=256Mi \
            --cpu=1 \
            --min-instances=1 \
            --max-instances=1 \
            --no-allow-unauthenticated \
            --service-account=${{ env.SA_EMAIL }} \
            --vpc-connector=lunara-connector \
            --add-cloudsql-instances=${{ env.GCP_PROJECT }}:${{ env.GCP_REGION }}:lunara-postgres \
            --set-secrets="DATABASE_URL=lunara-db-url:latest" \
            --set-env-vars="GOOGLE_CLOUD_PROJECT=${{ env.GCP_PROJECT }},PUBSUB_SUB_PLAYS=raw-plays-sub,PUBSUB_SUB_SCOREBOARD=raw-scoreboard-sub,PUBSUB_TOPIC_ENRICHED=enriched-plays,PUBSUB_TOPIC_STATE=game-state" \
            --quiet

      - name: Deploy Lumen Bot
        if: steps.svc.outputs.lumen == 'true'
        run: |
          gcloud run deploy cephalon-lumen \
            --image=${{ env.IMAGE_REGISTRY }}/lumen-bot:${{ github.sha }} \
            --platform=managed \
            --region=${{ env.GCP_REGION }} \
            --port=8080 \
            --memory=256Mi \
            --cpu=1 \
            --min-instances=1 \
            --max-instances=1 \
            --no-allow-unauthenticated \
            --service-account=${{ env.SA_EMAIL }} \
            --set-secrets="DISCORD_TOKEN=lumen-discord-token:latest,ANTHROPIC_API_KEY=anthropic-api-key:latest" \
            --set-env-vars="LUNARA_API_URL=https://lunara-api-889243758895.us-central1.run.app,LUNARA_WS_URL=wss://lunara-api-889243758895.us-central1.run.app/ws" \
            --quiet

      - name: Print results
        run: |
          echo "=== Deploy Complete ==="
          for svc in lunara-api lunara-ingestion lunara-stream-processor cephalon-lumen; do
            REV=$(gcloud run services describe "$svc" \
              --region=${{ env.GCP_REGION }} --format="value(status.latestReadyRevisionName)" 2>/dev/null || echo "N/A")
            echo "  $svc: $REV"
          done
